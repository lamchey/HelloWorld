# 覆写配置
# 作者：https://github.com/lamchey
# 项目地址：https://github.com/lamchey/HelloWorld
# 时间：2026-02-17-11-36

rule-providers:
  SelfDirect:
    url: https://raw.githubusercontent.com/lamchey/HelloWorld/refs/heads/main/Rules/Direct.list
    path: ./ruleset/SelfDirect.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  FixDirect:
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Direct/Direct.yaml
    path: ./ruleset/FixDirect.yaml
    behavior: domain
    interval: 86400
    format: yaml
    type: http
  SelfReject:
    url: https://raw.githubusercontent.com/lamchey/HelloWorld/refs/heads/main/Rules/Reject.list
    path: ./ruleset/SelfReject.list
    behavior: classical
    interval: 86400
    format: text
    type: http
  BlockHttpDNS:
    url: https://raw.githubusercontent.com/peiyingyao/Rule-for-OCD/refs/heads/master/rule/Clash/BlockHttpDNS/BlockHttpDNS_OCD_Domain.mrs
    path: ./ruleset/BlockHttpDNS.mrs
    behavior: domain
    interval: 86400
    format: mrs
    type: http
  Advertising:
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/AdvertisingLite/AdvertisingLite_Classical.yaml
    path: ./ruleset/Advertising.yaml
    behavior: classical
    interval: 86400
    format: yaml
    type: http

+rules:
  # 直连规则
  - "RULE-SET,SelfDirect,DIRECT"
  - "RULE-SET,FixDirect,DIRECT"
  # 屏蔽规则
  - "RULE-SET,SelfReject,REJECT-DROP"
  - "RULE-SET,BlockHttpDNS,REJECT-DROP"
  - "RULE-SET,Advertising,REJECT-DROP"
